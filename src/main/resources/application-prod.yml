spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/prod_db?currentSchema=assess_pro_db_production}
    username: ${DB_USERNAME:prod_user}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 20
      minimum-idle: 10
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update   # Не менять схему автоматически
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.xml
    contexts: production
    drop-first: false
  thymeleaf:
    cache: true
  devtools:
    restart:
      enabled: false
  mail:
    host: mailhog
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  base-url: http://72.56.5.58:8080
server:
  forward-headers-strategy: native
logging:
  level:
    com.frist.assesspro: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    org.springframework.security: WARN

springdoc:
  enabled: false   # Отключаем Swagger в проде
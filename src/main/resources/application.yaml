spring:
  application:
    name: assess-pro
  validation:
    enabled: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 15
          order_inserts: true
          order_updates: true
        default_schema: assess_pro_db
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# Общие настройки логирования (можно переопределить в профилях)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/assesspro.log

# Swagger/OpenAPI – в dev включён, в prod отключён через профиль
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.frist.assesspro.controllers
  show-actuator: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# Minio
minio:
  endpoint: http://minio:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: assesspro-materials
  secure: false
app:
  base-url: http://localhost:8080
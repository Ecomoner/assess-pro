spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dev_postgres?currentSchema=assess_pro_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 40
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        generate_statistics: true
        log_slow_query: 0
        hbm2ddl:
          create_namespaces: true
        format_sql: false
        use_sql_comments: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml
    default-schema: assess_pro_db

  thymeleaf:
    cache: false
  devtools:
    restart:
      enabled: true

  mail:
    host: localhost          # имя сервиса в Docker
    port: 1025
    username:              # не требуется
    password:              # не требуется
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
logging:
  level:
    com.frist.assesspro: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.stat: DEBUG
    org.hibernate.type: TRACE
    org.springframework.security: DEBUG

springdoc:
  enabled: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: assesspro-materials
  secure: false
databaseChangeLog:
  - changeSet:
      id: create-notifications-table
      author: Вадим
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notification_user
                    references: users(id)
              - column:
                  name: message
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: related_entity_id
                  type: bigint
              - column:
                  name: is_read
                  type: boolean
                  defaultValue: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: now()
databaseChangeLog:
  - changeSet:
      id: 1
      author: dev
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: username, type: VARCHAR(50), constraints: { nullable: false, unique: true } }
              - column: { name: password, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: role, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: first_name, type: VARCHAR(100) }
              - column: { name: last_name, type: VARCHAR(100) }
              - column: { name: middle_name, type: VARCHAR(100) }
              - column: { name: is_profile_complete, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", constraints: { nullable: false } }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true }
        - createTable:
            tableName: categories
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: name, type: VARCHAR(100), constraints: { nullable: false, unique: true } }
              - column: { name: description, type: TEXT }
              - column: { name: created_by, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_category_created_by, references: users(id) } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", constraints: { nullable: false } }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true }
        - createTable:
            tableName: tests
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: title, type: VARCHAR(200), constraints: { nullable: false } }
              - column: { name: description, type: TEXT }
              - column: { name: created_by, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_test_created_by, references: users(id) } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", constraints: { nullable: false } }
              - column: { name: is_published, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: time_limit_minutes, type: INTEGER, defaultValueNumeric: 0, constraints: { check: "time_limit_minutes >= 0 and time_limit_minutes <= 300" } }
              - column: { name: retry_cooldown_hours, type: INTEGER, defaultValueNumeric: 0, constraints: { check: "retry_cooldown_hours >= 0 and retry_cooldown_hours <= 336" } }
              - column: { name: retry_cooldown_days, type: INTEGER, defaultValueNumeric: 0, constraints: { check: "retry_cooldown_days >= 0 and retry_cooldown_days <= 14" } }
              - column: { name: category_id, type: BIGINT, constraints: { foreignKeyName: fk_test_category, references: categories(id) } }
        - createTable:
            tableName: questions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: text, type: TEXT, constraints: { nullable: false } }
              - column: { name: order_index, type: INTEGER, defaultValueNumeric: 0, constraints: { nullable: false, check: "order_index >= 0" } }
              - column: { name: test_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_question_test, references: tests(id) } }
        - createTable:
            tableName: answer_options
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: text, type: TEXT, constraints: { nullable: false } }
              - column: { name: is_correct, type: BOOLEAN, constraints: { nullable: false } }
              - column: { name: question_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_answer_option_question, references: questions(id) } }
        - createTable:
            tableName: test_attempts
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: test_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_attempt_test, references: tests(id) } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_attempt_user, references: users(id) } }
              - column: { name: start_time, type: TIMESTAMP, constraints: { nullable: false } }
              - column: { name: end_time, type: TIMESTAMP }
              - column: { name: total_score, type: INTEGER, defaultValueNumeric: 0, constraints: { check: "total_score >= 0" } }
              - column: { name: status, type: VARCHAR(255), constraints: { nullable: false } }
        - createTable:
            tableName: user_answers
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: attempt_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_user_answer_attempt, references: test_attempts(id) } }
              - column: { name: question_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_user_answer_question, references: questions(id) } }
              - column: { name: chosen_answer_option_id, type: BIGINT, constraints: { foreignKeyName: fk_user_answer_option, references: answer_options(id) } }
              - column: { name: is_correct, type: BOOLEAN }
              - column: { name: points_earned, type: INTEGER, defaultValueNumeric: 0, constraints: { check: "points_earned >= 0" } }
            addUniqueConstraint:
              columnNames: attempt_id, question_id
              constraintName: uk_user_answer_attempt_question
        - createTable:
            tableName: retry_cooldown_exceptions
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: test_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_exception_test, references: tests(id) } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_exception_user, references: users(id) } }
              - column: { name: created_by, type: BIGINT, constraints: { nullable: false, foreignKeyName: fk_exception_creator, references: users(id) } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", constraints: { nullable: false } }
              - column: { name: expires_at, type: TIMESTAMP }
              - column: { name: is_permanent, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: reason, type: TEXT }
            addUniqueConstraint:
              columnNames: test_id, user_id
              constraintName: uk_cooldown_exception_test_user
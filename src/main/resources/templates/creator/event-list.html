<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('События')}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container-fluid py-3 py-md-4 bg-light">
    <div class="container px-2 px-md-3">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3 mb-md-4 gap-2">
            <h1 class="h3 h2-md mb-0">
                <i class="bi bi-calendar-event text-success me-2"></i>
                События
            </h1>
            <a th:href="@{/creator/events/new}" class="btn btn-dark w-100 w-sm-auto">
                <i class="bi bi-plus-circle me-2"></i>Создать событие
            </a>
        </div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show py-2">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span class="small" th:text="${successMessage}">Успех</span>
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show py-2">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span class="small" th:text="${errorMessage}">Ошибка</span>
            <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Название</th>
                            <th class="d-none d-md-table-cell">Описание</th>
                            <th class="text-end">Действия</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="event : ${events}">
                            <td>
                                <strong th:text="${event.name}">Название</strong>
                                <span class="d-block d-sm-none text-muted small mt-1" th:text="${#strings.abbreviate(event.description, 40)} ?: '-'">Описание</span>
                            </td>
                            <td class="d-none d-md-table-cell text-break" th:text="${#strings.abbreviate(event.description, 60)} ?: '-'">Описание</td>
                            <td class="text-end">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/creator/events/edit/{id}(id=${event.id})}" class="btn btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <button type="button" class="btn btn-outline-danger delete-event-btn"
                                            th:data-id="${event.id}"
                                            th:data-name="${event.name}">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                                <!-- Скрытая форма для удаления (используется JS) -->
                                <form th:id="'deleteForm' + ${event.id}"
                                      th:action="@{/creator/events/delete/{id}(id=${event.id})}"
                                      method="post" style="display: none;"></form>
                            </td>
                        </tr>
                        <tr th:if="${events.isEmpty()}">
                            <td colspan="3" class="text-center py-4 text-muted">
                                <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
                                События не найдены
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Пагинация -->
            <div class="card-footer bg-white border-0 py-3">
                <div th:replace="~{fragments/pagination :: pagination(
                        currentPage=${pageNumber},
                        totalPages=${totalPages},
                        pageSize=${pageSize},
                        baseUrl='/creator/events'
                    )}"></div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white py-2">
                <h5 class="modal-title small">Подтверждение удаления</h5>
                <button type="button" class="btn-close btn-close-white btn-sm" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-3">
                <p class="mb-0 small">Удалить событие <strong id="deleteEventName"></strong>?</p>
            </div>
            <div class="modal-footer p-2">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-sm btn-danger" id="confirmDeleteBtn">Удалить</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<!-- Скрипт для обработки удаления через модальное окно -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var deleteModal = document.getElementById('deleteModal');
        var modal = new bootstrap.Modal(deleteModal);
        var confirmBtn = document.getElementById('confirmDeleteBtn');
        var deleteEventName = document.getElementById('deleteEventName');
        var formToSubmit = null;

        // Назначаем обработчик на все кнопки удаления
        document.querySelectorAll('.delete-event-btn').forEach(function(button) {
            button.addEventListener('click', function() {
                var eventId = this.getAttribute('data-id');
                var eventName = this.getAttribute('data-name');
                deleteEventName.textContent = eventName;
                // Находим форму, соответствующую этому событию
                formToSubmit = document.getElementById('deleteForm' + eventId);
                modal.show();
            });
        });

        // Обработчик подтверждения удаления
        confirmBtn.addEventListener('click', function() {
            if (formToSubmit) {
                formToSubmit.submit();
            }
        });
    });
</script>
</body>
</html>

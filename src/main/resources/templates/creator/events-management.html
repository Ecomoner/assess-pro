<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Управление событиями')}">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css" rel="stylesheet">
    <style>
        #calendar {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container py-4">
    <h2 class="mb-4">Управление событиями</h2>
    <div id="calendar"></div>
</div>

<div class="modal fade" id="eventModal" tabindex="-1" aria-labelledby="eventModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="eventModalLabel">Событие</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="eventForm">
                    <input type="hidden" id="eventId">
                    <div class="mb-3">
                        <label for="title" class="form-label">Название</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="start" class="form-label">Дата</label>
                        <input type="date" class="form-control" id="start" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">Удалить</button>
                <button type="button" class="btn btn-primary" id="saveBtn">Сохранить</button>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ru',
            firstDay: 1,
            events: '/api/events',
            selectable: true,
            select: function(info) {
                document.getElementById('eventId').value = '';
                document.getElementById('title').value = '';
                document.getElementById('start').value = info.startStr;
                document.getElementById('description').value = '';
                document.getElementById('deleteBtn').style.display = 'none';
                document.getElementById('eventModalLabel').textContent = 'Новое событие';
                var modal = new bootstrap.Modal(document.getElementById('eventModal'));
                modal.show();
                calendar.unselect();
            },
            eventClick: function(info) {
                var event = info.event;
                document.getElementById('eventId').value = event.id;
                document.getElementById('title').value = event.title;
                document.getElementById('start').value = event.startStr;
                document.getElementById('description').value = event.extendedProps.description || '';
                document.getElementById('deleteBtn').style.display = 'inline-block';
                document.getElementById('eventModalLabel').textContent = 'Редактировать событие';
                var modal = new bootstrap.Modal(document.getElementById('eventModal'));
                modal.show();
                info.jsEvent.preventDefault();
            },
            eventTimeFormat: {
                hour: '2-digit',
                minute: '2-digit',
                omitZeroMinute: false,
                meridiem: false
            }
        });
        calendar.render();

        document.getElementById('saveBtn').addEventListener('click', function() {
            var id = document.getElementById('eventId').value;
            var title = document.getElementById('title').value;
            var start = document.getElementById('start').value;
            var description = document.getElementById('description').value;

            if (!title || !start) {
                alert('Название и дата обязательны');
                return;
            }

            var data = { title: title, start: start, description: description };
            var url = '/api/events';
            var method = 'POST';
            if (id) { url += '/' + id; method = 'PUT'; }

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(function(response) {
                if (response.ok) {
                    calendar.refetchEvents();
                    bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
                } else {
                    alert('Ошибка сохранения');
                }
            });
        });

        document.getElementById('deleteBtn').addEventListener('click', function() {
            if (!confirm('Удалить событие?')) return;
            var id = document.getElementById('eventId').value;
            fetch('/api/events/' + id, { method: 'DELETE' }).then(function(response) {
                if (response.ok) {
                    calendar.getEventById(id).remove();
                    bootstrap.Modal.getInstance(document.getElementById('eventModal')).hide();
                }
            });
        });
    });
</script>
</body>
</html>

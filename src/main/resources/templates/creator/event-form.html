<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header(${action == 'create' ? 'Создание события' : 'Редактирование события'})}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>

<div class="container py-3 py-md-4">
    <div class="row">
        <div class="col-12 mb-3 mb-md-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb flex-wrap">
                    <li class="breadcrumb-item"><a th:href="@{/creator/events}" class="text-decoration-none">События</a></li>
                    <li class="breadcrumb-item active" th:text="${action == 'create' ? 'Создание' : 'Редактирование'}">
                        Создание
                    </li>
                </ol>
            </nav>
            <h1 class="h3 h2-md mb-0" th:text="${action == 'create' ? 'Создание события' : 'Редактирование события'}">
                Создание события
            </h1>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-body p-3 p-md-4">
                    <!-- Сообщения об ошибках -->
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show py-2">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span class="small" th:text="${errorMessage}">Ошибка</span>
                        <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
                    </div>
                    <form th:action="${action == 'create' ? '/creator/events/new' : '/creator/events/update/' + eventId}"
                          th:object="${eventDTO}"
                          method="post"
                          class="needs-validation"
                          novalidate>
                        <div th:if="${action == 'edit'}" class="mb-3">
                            <label class="form-label fw-semibold small">ID</label>
                            <input type="text" class="form-control" th:value="${eventId}" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold small">Название *</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   required minlength="3">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</div>
                            <small class="text-muted d-block small">Минимум 3 символа</small>
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label fw-semibold small">Описание</label>
                            <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                                      placeholder="Подробное описание события"></textarea>
                        </div>
                        <hr class="my-3">
                        <div class="d-flex flex-column flex-sm-row gap-2">
                            <button type="submit" class="btn btn-dark px-4 py-2 w-100 w-sm-auto">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${action == 'create'} ? 'Создать' : 'Сохранить'">Сохранить</span>
                            </button>
                            <a th:href="@{/creator/events}" class="btn btn-outline-secondary px-4 py-2 w-100 w-sm-auto">
                                <i class="bi bi-x-circle me-2"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/common.js"></script>
<script>
    // Bootstrap валидация
    (function() {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function(form) {
            form.addEventListener('submit', function(event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>

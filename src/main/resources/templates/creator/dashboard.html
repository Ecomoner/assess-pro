<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Дашборд менеджера')}",>
    <meta charset="UTF-8">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container-fluid py-3 py-md-4 bg-light">
    <div class="container px-2 px-md-3">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-3 mb-md-4 gap-2">
            <div>
                <h1 class="h3 h2-md mb-1">
                    Панель управления
                </h1>
            </div>
        </div>
        <div class="row g-2 g-md-4 mb-3 mb-md-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm bg-primary bg-opacity-10">
                    <div class="card-body p-2 p-md-3">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-25 p-2 p-md-3 rounded-circle me-2 me-md-3">
                                    <i class="bi bi-people text-primary fs-5 fs-md-3"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1 h6 h5-md">Управление тестами</h5>
                                    <p class="text-muted mb-0 small">
                                        Всего тестов: <strong th:text="${stats.totalTests}">0</strong>
                                    </p>
                                </div>
                            </div>
                            <a th:href="@{/creator/tests}" class="btn btn-dark w-100 w-sm-auto">
                                <i class="bi bi-arrow-right me-2"></i>Пререйти к списку</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-2 g-md-4 mb-3 mb-md-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm bg-primary bg-opacity-10">
                    <div class="card-body p-2 p-md-3">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-25 p-2 p-md-3 rounded-circle me-2 me-md-3">
                                    <i class="bi bi-people text-primary fs-5 fs-md-3"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1 h6 h5-md">Управление тестировщиками</h5>
                                    <p class="text-muted mb-0 small">
                                        Всего тестировщиков: <strong th:text="${totalTesters}">0</strong>
                                    </p>
                                </div>
                            </div>
                            <a th:href="@{/creator/testers}" class="btn btn-dark w-100 w-sm-auto">
                                <i class="bi bi-arrow-right me-2"></i>Перейти к списку
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-2 g-md-4 mb-3 mb-md-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm bg-primary bg-opacity-10">
                    <div class="card-body p-2 p-md-3">
                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-2">
                            <div class="d-flex align-items-center">
                                <div class="bg-primary bg-opacity-25 p-2 p-md-3 rounded-circle me-2 me-md-3">
                                    <i class="bi bi-people text-primary fs-5 fs-md-3"></i>
                                </div>
                                <div>
                                    <h5 class="mb-1 h6 h5-md">Управление событиями</h5>
                                    <p class="text-muted mb-0 small">
                                        Всего событий: <strong th:text="${totalEvents}">0</strong>
                                    </p>
                                </div>
                            </div>
                            <a th:href="@{/creator/events}" class="btn btn-dark w-100 w-sm-auto">
                                <i class="bi bi-arrow-right me-2"></i>Перейти к списку
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-4 col-lg-3 mb-3">
            <a th:href="@{/creator/materials}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 bg-info bg-opacity-10">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-journal-text display-5 text-info"></i>
                        <h6 class="mt-2 mb-0">Материалы для обучения</h6>
                        <small class="text-muted">Управление секциями и PDF</small>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

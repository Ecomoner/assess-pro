<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="footer" class="container-fluid bg-dark text-light mt-5 py-4">
    <div class="container">
        <div class="row">
            <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
            <div class="col-md-4">
                <h5></i>AssessPro</h5>
                <p class="small">Платформа для прохождения тестов и улучшения своих знаний. Оценивайте знания эффективно!</p>
            </div>
            <div class="col-md-4">
                <h6>Контакты</h6>
                <p class="small mb-1"><i class="bi bi-envelope me-2"></i>support@assesspro.ru</p>
                <p class="small mb-1"><i class="bi bi-telephone me-2"></i>+7 (999) 123-45-67</p>
            </div>
            <div class="col-md-4">
                <h6>Мы в соцсетях</h6>
                <a href="#" class="text-light me-3"><i class="fab fa-telegram fa-lg"></i></a>
                <a href="#" class="text-light me-3"><i class="fab fa-vk fa-lg"></i></a>
                <a href="#" class="text-light"><i class="fab fa-github fa-lg"></i></a>
            </div>
        </div>
        <hr class="bg-secondary">
        <div class="text-center small">
            &copy; 2026 AssessPro. Все права защищены.
        </div>
    </div>
</div>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        const badge = document.getElementById('notificationBadge');
        const list = document.getElementById('notificationList');
        const dropdownToggle = document.getElementById('notificationsDropdown');

        if (!badge || !list || !dropdownToggle) {
            console.warn('Notification elements not found on this page');
            return;
        }

        // Явная инициализация dropdown
        const dropdown = new bootstrap.Dropdown(dropdownToggle);

        function updateBadge(count) {
            if (count > 0) {
                badge.textContent = count;
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
        }

        function loadUnreadNotifications() {
            fetch('/api/notifications/unread')
                .then(res => {
                    if (!res.ok) throw new Error('Ошибка загрузки');
                    return res.json();
                })
                .then(data => {
                    list.innerHTML = '';
                    if (data.length === 0) {
                        list.innerHTML = '<li><span class="dropdown-item-text text-muted">Нет новых уведомлений</span></li>';
                    } else {
                        data.forEach(n => {
                            const item = document.createElement('li');
                            item.innerHTML = `
                            <a class="dropdown-item d-flex align-items-start"
                               href="${n.targetUrl || '#'}" data-id="${n.id}">
                                <span class="notification-text">${n.message}</span>
                                <button class="btn btn-sm btn-link mark-read" data-id="${n.id}" title="Отметить прочитанным">
                                    <i class="bi bi-check"></i>
                                </button>
                            </a>`;
                            list.appendChild(item);
                        });
                    }
                    updateBadge(data.length);
                })
                .catch(err => console.error('Ошибка загрузки уведомлений:', err));
        }

        // Обработчик кликов
        list.addEventListener('click', function(e) {
            const markBtn = e.target.closest('.mark-read');
            const link = e.target.closest('a.dropdown-item');

            if (markBtn) {
                e.preventDefault();
                e.stopPropagation();
                const id = markBtn.dataset.id;
                if (id) {
                    fetch(`/api/notifications/${id}/read`, { method: 'POST' })
                        .then(() => loadUnreadNotifications());
                }
            } else if (link) {
                e.preventDefault();
                const id = link.dataset.id;
                if (id) {
                    fetch(`/api/notifications/${id}/read`, { method: 'POST' })
                        .then(() => {
                            window.location.href = link.getAttribute('href');
                        });
                } else {
                    window.location.href = link.getAttribute('href');
                }
            }
        });

        // SSE подписка
        const eventSource = new EventSource('/sse/subscribe');
        eventSource.onmessage = function(event) {
            const notification = JSON.parse(event.data);
            showToast(notification.message, notification.targetUrl);
            loadUnreadNotifications();
        };
        eventSource.onerror = function() {
            console.warn('SSE connection error, will retry...');
        };

        function showToast(message, url) {
            const toastContainer = document.getElementById('toast-container');
            if (!toastContainer) return;
            const toastHTML = `
            <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <strong class="me-auto">Уведомление</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body">
                    ${message}
                    <a href="${url}" class="btn btn-sm btn-primary ms-2">Перейти</a>
                </div>
            </div>`;
            toastContainer.insertAdjacentHTML('beforeend', toastHTML);
            const toastEl = toastContainer.lastElementChild;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        // Первая загрузка
        loadUnreadNotifications();
    });
</script>

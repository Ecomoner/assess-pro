<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<nav th:fragment="navigation" class="navbar navbar-expand-lg bg-white sticky-top py-3">
    <div class="container-fluid">
        <!-- Логотип -->
        <a class="navbar-brand fw-bold d-flex align-items-center" th:href="@{/home}">
            <img th:src="@{/images/logo.png}" height="36" class="d-inline-block align-text-top me-2" alt="Logo">
            <span class="d-none d-sm-inline" style="color: #111827;">Molecule</span>
            <span class="d-inline d-sm-none" style="color: #111827;">M</span>
        </a>

        <!-- Кнопка бургер-меню -->
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Основное меню -->
        <div class="collapse navbar-collapse" id="navbarNav"
             th:with="role=${#authentication != null and #authentication.isAuthenticated() ? #authentication.authorities.iterator().next().authority : 'ROLE_ANONYMOUS'}">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
                <!-- Администратор -->
                <li class="nav-item" th:if="${role == 'ROLE_ADMIN'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>
                        <span class="d-inline">Главная</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_ADMIN'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/admin/statistics}">
                        <i class="bi bi-bar-chart me-1"></i>
                        <span class="d-inline">Статистика</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_ADMIN'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/navigation/regulations}">
                        <i class="bi bi-file-text me-1"></i>
                        <span class="d-inline">Регламент</span>
                    </a>
                </li>

                <!-- Создатель тестов -->
                <li class="nav-item" th:if="${role == 'ROLE_CREATOR'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/creator/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>
                        <span class="d-inline">Главная</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_CREATOR'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/creator/categories}">
                        <i class="bi bi-tags me-1"></i>
                        <span class="d-inline">Категории</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_CREATOR'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/navigation/regulations}">
                        <i class="bi bi-file-text me-1"></i>
                        <span class="d-inline">Регламент</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_CREATOR'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/navigation/materials}">
                        <i class="bi bi-book me-1"></i>
                        <span class="d-inline">Материалы</span>
                    </a>
                </li>

                <!-- Тестировщик -->
                <li class="nav-item" th:if="${role == 'ROLE_TESTER'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/tester/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>
                        <span class="d-inline">Главная</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_TESTER'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/navigation/materials}">
                        <i class="bi bi-book me-1"></i>
                        <span class="d-inline">Материалы</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_TESTER'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/tester/catalog}">
                        <i class="bi bi-grid me-1"></i>
                        <span class="d-inline">Категории</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_TESTER'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/tester/history}">
                        <i class="bi bi-clock-history me-1"></i>
                        <span class="d-inline">История</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${role == 'ROLE_TESTER'}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/navigation/regulations}">
                        <i class="bi bi-file-text me-1"></i>
                        <span class="d-inline">Регламент</span>
                    </a>
                </li>
            </ul>

            <!-- Правая часть: профиль / вход -->
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item dropdown" th:if="${#authentication != null and #authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
                    <a class="nav-link dropdown-toggle rounded-pill px-3" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span class="d-none d-sm-inline" th:text="${#authentication.name}">User</span>
                        <span class="badge ms-1 d-none d-md-inline" style="background: #e5e7eb; color: #374151;" th:text="${role.replace('ROLE_', '')}">ROLE</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-4 mt-2">
                        <li><a class="dropdown-item rounded-3 py-2" th:href="@{/profile/edit}"><i class="bi bi-pencil-square me-2"></i>Профиль</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger rounded-3 py-2">
                                    <i class="bi bi-box-arrow-right me-2"></i>Выйти
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
                <li class="nav-item" th:if="${#authentication == null or not #authentication.isAuthenticated()}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>
                        <span class="d-none d-sm-inline">Вход</span>
                    </a>
                </li>
                <li class="nav-item" th:if="${#authentication == null or not #authentication.isAuthenticated()}">
                    <a class="nav-link rounded-pill px-3" th:href="@{/register}">
                        <i class="bi bi-person-plus me-1"></i>
                        <span class="d-none d-sm-inline">Регистрация</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

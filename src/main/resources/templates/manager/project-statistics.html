<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Статистика проекта')}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container py-3">
    <h1 th:text="'Проект: ' + ${project.name}"></h1>
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-light">
                <div class="card-body">
                    <h6>Тестировщиков</h6>
                    <h3 th:text="${testersCount}"></h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-light">
                <div class="card-body">
                    <h6>Завершено попыток</h6>
                    <h3 th:text="${completedAttempts}"></h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-light">
                <div class="card-body">
                    <h6>Средний балл</h6>
                    <h3 th:text="${#numbers.formatDecimal(averageScore, 1, 1)}"></h3>
                </div>
            </div>
        </div>
    </div>
    <h4>Тестировщики</h4>
    <table class="table table-hover">
        <thead class="table-light">
        <tr>
            <th>Тестировщик</th>
            <th>Попыток</th>
            <th>Средний балл</th>
            <th>Последняя попытка</th>
            <th></th> <!-- новая колонка для действий -->
        </tr>
        </thead>
        <tbody>
        <tr th:each="tester : ${testers}">
            <td th:text="${tester.fullName}"></td>
            <td th:text="${tester.attemptCount}"></td>
            <td th:text="${#numbers.formatDecimal(tester.averageScore, 1, 1)}"></td>
            <td th:text="${tester.lastAttemptDate != null ? #temporals.format(tester.lastAttemptDate, 'dd.MM.yyyy HH:mm') : '—'}"></td>
            <td>
                <a th:if="${tester.username != null}"
                   th:href="@{/manager/tester/{username}/full-statistics(username=${tester.username})}"
                   class="btn btn-sm btn-outline-dark">Статистика</a>
                <span th:unless="${tester.username != null}" class="text-muted">—</span>
            </td>
        </tr>
        <tr th:if="${testers.isEmpty()}">
            <td colspan="5" class="text-center text-muted">Нет данных</td>
        </tr>
        </tbody>
    </table>
</div>
<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

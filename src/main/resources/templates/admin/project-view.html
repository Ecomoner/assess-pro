<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Проект: ' + ${project.name})}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container py-3">
    <!-- Хлебные крошки -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb flex-wrap">
            <li class="breadcrumb-item"><a th:href="@{/admin/projects}" class="text-decoration-none">Проекты</a></li>
            <li class="breadcrumb-item active" th:text="${project.name}"></li>
        </ol>
    </nav>

    <!-- Сообщения -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row">
        <!-- Карточка проекта -->
        <div class="col-12 col-lg-6 mb-4">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="card-title" th:text="${project.name}"></h5>
                    <p class="text-muted" th:text="${project.description}"></p>
                    <p>Активен: <span th:classappend="${project.active ? 'badge bg-success' : 'badge bg-secondary'}" th:text="${project.active ? 'Да' : 'Нет'}"></span></p>

                    <!-- Менеджер -->
                    <div class="mb-3">
                        <label class="fw-bold">Менеджер:</label>
                        <span th:if="${project.manager != null}" th:text="${project.manager.fullName} + ' (' + ${project.manager.username} + ')'"></span>
                        <span th:if="${project.manager == null}" class="text-muted">Не назначен</span>
                        <button class="btn btn-sm btn-outline-primary ms-2" data-bs-toggle="modal" data-bs-target="#assignManagerModal">Изменить</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Список тестеров -->
        <div class="col-12 col-lg-6 mb-4">
            <div class="card shadow border-0">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Тестеры (<span th:text="${project.testers.size()}"></span>)</h5>
                    <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addTestersModal">Добавить</button>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush" th:if="${!project.testers.isEmpty()}">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="tester : ${project.testers}">
                            <span th:text="${tester.fullName} + ' (' + ${tester.username} + ')'"></span>
                            <form th:action="@{/admin/projects/view/{id}/remove-tester(id=${project.id})}" method="post" class="m-0">
                                <input type="hidden" name="userId" th:value="${tester.id}">
                                <button class="btn btn-sm btn-outline-danger" title="Убрать из проекта">✕</button>
                            </form>
                        </li>
                    </ul>
                    <div th:if="${project.testers.isEmpty()}" class="p-3 text-muted">Нет тестеров</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно: Назначение менеджера -->
<div class="modal fade" id="assignManagerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/projects/view/{id}/assign-manager(id=${project.id})}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Назначить менеджера</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select name="managerId" class="form-select" required>
                        <option value="">Выберите менеджера</option>
                        <option th:each="m : ${managers}" th:value="${m.id}" th:text="${m.fullName} + ' (' + ${m.username} + ')'"></option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-dark">Назначить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Модальное окно: Добавление тестеров -->
<div class="modal fade" id="addTestersModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/admin/projects/view/{id}/add-testers(id=${project.id})}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Добавить тестеров</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select name="testersId" multiple class="form-select" size="10" required>
                        <option th:each="t : ${testers}" th:value="${t.id}" th:text="${t.fullName} + ' (' + ${t.username} + ')'"></option>
                    </select>
                    <small class="text-muted">Удерживайте Ctrl для выбора нескольких</small>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-dark">Добавить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

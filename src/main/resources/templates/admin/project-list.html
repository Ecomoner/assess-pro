<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Управление проектами')}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container py-3">
    <h1>Проекты</h1>
    <!-- Поиск -->
    <form th:action="@{/admin/projects}" method="get" class="row g-2 mb-3">
        <div class="col-md-6">
            <input type="text" name="search" th:value="${search}" class="form-control form-control-sm" placeholder="Поиск...">
        </div>
        <div class="col-auto">
            <button class="btn btn-dark btn-sm">Найти</button>
        </div>
    </form>
    <a th:href="@{/admin/projects/new}" class="btn btn-success btn-sm mb-3">Добавить проект</a>
    <!-- Таблица -->
    <table class="table table-hover">
        <thead class="table-light">
        <tr>
            <th>Название</th>
            <th>Менеджер</th>
            <th>Активен</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${projects}">
            <td th:text="${p.name}"></td>
            <td th:text="${p.manager != null ? p.manager : '-'}">Менеджер</td>
            <td>
                <span th:classappend="${p.active ? 'bg-success' : 'bg-secondary'}" class="badge" th:text="${p.active ? 'Да' : 'Нет'}"></span>
            </td>
            <td class="text-nowrap">
                <a th:href="@{/admin/projects/edit/{id}(id=${p.id})}" class="btn btn-outline-dark btn-sm" title="Редактировать">✎</a>
                <a th:href="@{/admin/projects/view/{id}(id=${p.id})}" class="btn btn-sm btn-outline-info" title="Просмотр">👁</a>
                <form th:action="@{/admin/projects/delete/{id}(id=${p.id})}" method="post" style="display:inline">
                    <button class="btn btn-outline-danger btn-sm"
                            th:disabled="${p.testersCount != null && p.testersCount > 0}"
                            th:title="${p.testersCount != null && p.testersCount > 0 ? 'Нельзя удалить проект с тестировщиками' : 'Удалить проект'}"
                            onclick="return confirm('Удалить проект «' + /*[[${p.name}]]*/ '' + '»?')">✕</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <!-- Пагинация -->
    <div th:replace="~{fragments/pagination :: pagination(
    currentPage=${currentPage},
    totalPages=${totalPages},
     pageSize=${pageSize},
    baseUrl='/admin/projects'
)}"></div>
</div>
<div th:replace="~{fragments/footer}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header(${project.id == null ? 'Новый проект' : 'Редактирование проекта'})}">
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<div class="container py-3 py-md-4">
    <div class="row">
        <div class="col-12 mb-3 mb-md-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb flex-wrap">
                    <li class="breadcrumb-item"><a th:href="@{/admin/projects}" class="text-decoration-none">Проекты</a></li>
                    <li class="breadcrumb-item active" th:text="${project.id == null ? 'Создание' : 'Редактирование'}">Создание</li>
                </ol>
            </nav>
            <h1 class="h3 h2-md mb-0" th:text="${project.id == null ? 'Создание нового проекта' : 'Редактирование проекта'}">
                Создание проекта
            </h1>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-body p-3 p-md-4">
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${errorMessage}">Ошибка</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <form th:action="${formAction}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold small">Название *</label>
                            <input type="text" id="name" name="name" class="form-control form-control-sm"
                                   th:value="${project.name}" required>
                        </div>
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="active" name="active" value="true"
                                       th:checked="${project.id == null ? true : project.active}">
                                <label class="form-check-label small" for="active">Активен</label>
                            </div>
                        </div>
                        <hr class="my-3">
                        <div class="d-flex flex-column flex-sm-row gap-2">
                            <button type="submit" class="btn btn-dark px-4 py-2 w-100 w-sm-auto">
                                <i class="bi bi-check-circle me-2"></i>
                                <span th:text="${project.id == null ? 'Создать' : 'Сохранить'}">Сохранить</span>
                            </button>
                            <a th:href="@{/admin/projects}" class="btn btn-outline-secondary px-4 py-2 w-100 w-sm-auto">
                                <i class="bi bi-x-circle me-2"></i>Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

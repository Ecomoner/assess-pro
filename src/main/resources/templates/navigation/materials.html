<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header('Материалы для обучения')}">
    <style>
        /* Импорт элегантного шрифта */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap');

        body {
            background: #faf9f7;
        }

        .toc-card {
            border: none;
            background: linear-gradient(145deg, #fdfbfb 0%, #f8f6f2 100%);
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border-radius: 16px;
            overflow: hidden;
        }

        .toc-card .card-header {
            background: transparent;
            border-bottom: 1px solid rgba(183, 140, 90, 0.2);
            padding: 1.2rem 1.5rem;
        }

        .toc-item {
            border-left: 3px solid transparent;
            border-radius: 0;
            padding: 0.9rem 1.5rem;
            font-weight: 450;
            color: #2c2c2c;
            transition: all 0.25s ease;
            background-color: transparent;
            border-bottom: 1px solid #eee;
        }

        .toc-item:last-child {
            border-bottom: none;
        }

        .toc-item:hover {
            background-color: #fff;
            border-left-color: #b78c5a;
            padding-left: 2rem !important;
            color: #000;
        }

        .btn-elegant i {
            margin-right: 6px;
        }

        .sticky-top-offset {
            top: 80px;
        }

        .section {
            scroll-margin-top: 80px;
        }

        @media (max-width: 767px) {
            .sticky-top-offset {
                top: 20px;
                position: relative !important;
            }
            .toc-card {
                margin-bottom: 20px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
<body>
<div th:replace="~{fragments/panel-navigation}"></div>
<main class="container-fluid px-0 py-4">
    <div class="row g-4">
        <!-- Оглавление -->
        <div class="col-12 col-md-4 col-lg-3 order-1">
            <div class="card toc-card sticky-md-top sticky-top-offset">
                <div class="card-header">
                    <h5 class="mb-0 fw-semibold">
                        <i class="bi bi-journal-bookmark-fill me-2" style="color: #b78c5a;"></i>Бренды
                    </h5>
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush">
                        <a href="#section1" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>Vilhelm Parfumerie</a>
                        <a href="#section2" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>AMOUAGE</a>
                        <a href="#section3" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>Atelier Des Ors</a>
                        <a href="#section4" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>Dr. LEVY</a>
                        <a href="#section5" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>Xerjoff</a>
                        <a href="#section6" class="list-group-item toc-item"><i class="bi bi-dot me-1"></i>Swiss Perfection</a>
                        <button class="btn btn-outline-dark btn-sm" onclick="showSection('presentation-section')">
                            <i class="bi bi-file-pdf"></i> Презентация
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-8 col-lg-9 order-2">
            <h1 class="display-5 fw-light mb-4" style="font-family: 'Playfair Display', serif;">Материалы для изучения</h1>
            <section id="section1" class="section mb-5 d-block">
                <div th:replace="~{materials/vilhelm :: content}"></div>
            </section>
            <section id="section2" class="section mb-5 d-none">
                <div th:replace="~{materials/amouage :: content}"></div>
            </section>
            <section id="section3" class="section mb-5 d-none">
                <div th:replace="~{materials/atelier :: content}"></div>
            </section>
            <section id="section4" class="section mb-5 d-none">
                <div th:replace="~{materials/drlevy :: content}"></div>
            </section>
            <section id="section5" class="section mb-5 d-none">
                <div th:replace="~{materials/xerjoff :: content}"></div>
            </section>
            <section id="section6" class="section mb-5 d-none">
                <div th:replace="~{materials/swiss :: content}"></div>
            </section>
            <section id="presentation-section" class="mt-4" style="display: none;">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-2">
                        <h5 class="mb-0 h6 h5-md">
                            <i class="bi bi-file-pdf text-danger me-2"></i>Презентация
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <!-- Контейнер для PDF.js -->
                        <div id="pdf-viewer" style="width: 100%;"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sections = document.querySelectorAll('.section');
        const tocLinks = document.querySelectorAll('.toc-item');

        function showSection(sectionId) {
            sections.forEach(section => {
                if (section.id === sectionId) {
                    section.classList.remove('d-none');
                    section.classList.add('d-block');
                } else {
                    section.classList.remove('d-block');
                    section.classList.add('d-none');
                }
            });
        }

        tocLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const sectionId = this.getAttribute('href').substring(1);
                showSection(sectionId);
                history.pushState(null, null, '#' + sectionId);
                // Плавный скролл к заголовку секции (опционально)
                document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // Показать секцию из URL или первую
        const hash = window.location.hash.substring(1);
        const defaultSection = 'section1';
        if (hash && document.getElementById(hash)) {
            showSection(hash);
        } else {
            showSection(defaultSection);
        }
    });

    // Установите воркер (обязательно для PDF.js)
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // Функция инициализации просмотра PDF
    function loadPdf(url) {
        const container = document.getElementById('pdf-viewer');
        container.innerHTML = ''; // очищаем

        pdfjsLib.getDocument(url).promise.then(pdf => {
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                pdf.getPage(pageNum).then(page => {
                    const scale = 1.2;
                    const viewport = page.getViewport({ scale: scale });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    canvas.style.display = 'block';
                    canvas.style.margin = '10px auto';
                    canvas.style.maxWidth = '100%';
                    canvas.style.height = 'auto';

                    container.appendChild(canvas);

                    page.render({
                        canvasContext: context,
                        viewport: viewport
                    });
                });
            }
        }).catch(err => {
            console.error('Ошибка загрузки PDF:', err);
            container.innerHTML = '<p class="text-center text-danger p-3">Не удалось загрузить PDF-файл.</p>';
        });
    }

    // Функция переключения секций (пример)
    function showSection(sectionId) {
        document.querySelectorAll('section').forEach(sec => sec.style.display = 'none');
        const target = document.getElementById(sectionId);
        if (target) {
            target.style.display = 'block';
            if (sectionId === 'presentation-section') {
                loadPdf('/pdf/presentation.pdf');
            }
        }
    }
</script>
</body>
</html>

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: assesspro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev_postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - assesspro-net

  app:
    build: .
    container_name: assesspro-app
    depends_on:
      - postgres
      - minio
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/dev_postgres?currentSchema=assess_pro_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - assesspro-net

  minio:
    image: minio/minio:latest
    container_name: assesspro-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - assesspro-net   # ← теперь та же сеть, что и у остальных

  mailhog:
    image: mailhog/mailhog:latest
    container_name: assesspro-mailhog
    restart: always
    ports:
      - "1025:1025"   # SMTP-порт
      - "8025:8025"   # веб-интерфейс
    networks:
      - assesspro-net

volumes:
  postgres_data:
  minio_data:

networks:
  assesspro-net:   # ← единое имя сети
